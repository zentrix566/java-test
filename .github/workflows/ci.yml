name: Java CI with Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 阶段 1：自动化测试与质量门禁
  test:
    name: Unit Test & Coverage Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests with Coverage Check
        # 核心熔断点：如果测试失败或 JaCoCo 覆盖率未达标（需在 pom.xml 配置），此步骤报错，流水线立即停止
        run: mvn clean test jacoco:check

      - name: Publish JUnit Test Report
        uses: mikepenz/action-junit-report@v4
        if: always() # 即使测试失败也要生成报告，方便排查原因
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'
          detailed_summary: true

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # 阶段 2：制品构建（只有阶段 1 成功才会运行）
  build-and-package:
    name: Build Artifact
    needs: test # 关键实现：建立 Job 依赖，实现“熔断”逻辑
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package JAR
        # 此时只需打包，不再重复运行测试以节省时间
        run: mvn package -DskipTests

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-jar
          path: target/*.jar