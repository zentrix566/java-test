name: Java CI with Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 阶段 1：自动化测试与熔断门禁
  test:
    name: Unit Test & Coverage Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests and Coverage Check
        # 这一步会顺序触发：测试 -> 生成报告 -> 检查 80% 阈值
        run: mvn clean test jacoco:check

      - name: Publish JUnit Report
        uses: mikepenz/action-junit-report@v4
        # 总是生成报告
        if: always() 
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'

      - name: Upload JaCoCo Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # 阶段 2：制品构建（仅在测试和覆盖率达标后运行）
  build-and-package:
    name: Build Production Artifact
    needs: test # 物理熔断：test 失败则本任务不运行
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: final-binary
          path: target/*.jar