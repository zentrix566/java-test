name: Java CI with Maven & JUnit Visualization

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Build and Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # 必须开启，用于发布测试报告到 GitHub Checks
      pull-requests: write # 用于在 PR 中展示测试汇总

    strategy:
      fail-fast: false # 即使某个版本失败，也让其他版本跑完
      matrix:
        java: [ '17', '21' ] # 运维视角：确保在不同 LTS 版本下的兼容性

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven # 自动缓存 ~/.m2/repository，加速后续构建

      - name: Run JUnit Tests
        run: mvn clean test
        # 即使测试失败，也要继续执行后续生成报告的步骤
        continue-on-error: false 

      # 生成可视化报告
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        # 无论测试通过还是失败，都生成可视化报告
        if: always() 
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'
          annotate_only: false # 在 Checks 页面生成详细注释
          detailed_summary: true

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-reports-jdk-${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 7

      # 构建并检查 JAR 是否可用（模拟预发布环境）
      - name: Package Application
        run: mvn package -DskipTests